<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחשבון שעות עבודה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #EDEBE6;
    --border: #D8D5CE;
    --text: #1A1917;
    --text-muted: #7A7772;
    --accent: #2B5C3F;
    --accent-light: #E6EFE9;
    --accent-text: #1D3F2C;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 520px;
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header p {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 1.5rem;
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .col-labels {
    display: grid;
    grid-template-columns: 1fr 20px 1fr 32px;
    gap: 8px;
    margin-bottom: 6px;
  }

  .col-label {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .segment-row {
    display: grid;
    grid-template-columns: 1fr 20px 1fr 32px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .time-input {
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
    width: 100%;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    outline: none;
  }

  .time-input::placeholder { color: var(--border); }

  .time-input:focus {
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(43,92,63,0.1);
  }

  .time-input.error {
    border-color: var(--danger);
    background: var(--danger-light);
  }

  .dash {
    text-align: center;
    color: var(--text-muted);
    font-size: 18px;
    font-weight: 300;
    line-height: 1;
  }

  .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 18px;
    width: 32px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }

  .remove-btn:hover {
    color: var(--danger);
    background: var(--danger-light);
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 9px 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 6px;
    transition: all 0.15s;
    justify-content: center;
  }

  .add-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .error-msg {
    font-size: 12px;
    color: var(--danger);
    margin-top: 10px;
    min-height: 18px;
    line-height: 1.4;
  }

  .summary-card {
    background: var(--accent);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
    display: none;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .summary-card.visible { display: block; }

  .summary-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 0.75rem;
  }

  .total-decimal {
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -2px;
    line-height: 1;
  }

  .total-unit {
    font-size: 16px;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    margin-right: 4px;
  }

  .summary-row {
    display: flex;
    gap: 1rem;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid rgba(255,255,255,0.15);
  }

  .summary-item {
    flex: 1;
  }

  .summary-item-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
  }

  .summary-item-value {
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
  }

  .breakdown-card {
    display: none;
  }

  .breakdown-card.visible {
    display: block;
  }

  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--surface2);
    font-size: 14px;
  }

  .breakdown-item:last-child { border-bottom: none; }

  .breakdown-range { color: var(--text-muted); font-weight: 400; }

  .breakdown-val {
    font-weight: 500;
    color: var(--accent-text);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 13px;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2rem;
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>מחשבון שעות עבודה</h1>
    <p>הכנס מקטעי שעות ביום וקבל סיכום עשרוני אוטומטי</p>
  </div>

  <div class="card">
    <div class="section-label">מקטעי עבודה</div>
    <div class="col-labels">
      <div class="col-label">מ–</div>
      <div></div>
      <div class="col-label">עד–</div>
      <div></div>
    </div>
    <div id="segments"></div>
    <div id="error-msg" class="error-msg"></div>
    <button class="add-btn" onclick="addSegment()">＋ הוסף מקטע</button>
  </div>

  <div class="summary-card" id="summary-card">
    <div class="summary-label">סה״כ שעות עבודה</div>
    <div>
      <span class="total-decimal" id="total-dec">0.00</span><span class="total-unit"> שעות</span>
    </div>
    <div class="summary-row">
      <div class="summary-item">
        <div class="summary-item-label">שעות ודקות</div>
        <div class="summary-item-value" id="total-hm">0:00</div>
      </div>
      <div class="summary-item">
        <div class="summary-item-label">מקטעים</div>
        <div class="summary-item-value" id="total-segs">0</div>
      </div>
    </div>
  </div>

  <div class="card breakdown-card" id="breakdown-card">
    <div class="section-label">פירוט</div>
    <div id="breakdown-list"></div>
  </div>

  <div class="footer">פורמט קלט: HH:MM · לדוגמה 08:45 או 17:12</div>
</div>

<script>
let segments = [{ id: 1 }];
let counter = 1;

function addSegment() {
  counter++;
  segments.push({ id: counter });
  render();
}

function removeSegment(id) {
  if (segments.length === 1) return;
  segments = segments.filter(s => s.id !== id);
  render();
  calculate();
}

function parseTime(str) {
  str = str.trim().replace('.', ':');
  const m = str.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h > 23 || min > 59) return null;
  return h + min / 60;
}

function toHM(dec) {
  const h = Math.floor(dec);
  const m = Math.round((dec - h) * 60);
  return `${h}:${String(m).padStart(2, '0')}`;
}

function calculate() {
  const rows = document.querySelectorAll('.segment-row');
  let total = 0, valid = 0;
  const errors = [];
  const breakdown = [];

  document.querySelectorAll('.time-input').forEach(el => el.classList.remove('error'));

  rows.forEach((row, i) => {
    const fromEl = row.querySelector('.from');
    const toEl = row.querySelector('.to');
    const fv = fromEl.value.trim(), tv = toEl.value.trim();
    if (!fv && !tv) return;
    const f = parseTime(fv), t = parseTime(tv);
    if (f === null && fv) { fromEl.classList.add('error'); errors.push(`שורה ${i+1}: פורמט לא תקין`); return; }
    if (t === null && tv) { toEl.classList.add('error'); errors.push(`שורה ${i+1}: פורמט לא תקין`); return; }
    if (f === null || t === null) return;
    if (t <= f) { toEl.classList.add('error'); errors.push(`שורה ${i+1}: שעת סיום חייבת להיות אחרי ההתחלה`); return; }
    const diff = t - f;
    total += diff;
    valid++;
    breakdown.push({ from: fv, to: tv, diff });
  });

  document.getElementById('error-msg').textContent = errors.join(' | ');

  const summaryCard = document.getElementById('summary-card');
  const breakdownCard = document.getElementById('breakdown-card');

  if (valid > 0) {
    summaryCard.classList.add('visible');
    document.getElementById('total-dec').textContent = total.toFixed(2);
    document.getElementById('total-hm').textContent = toHM(total);
    document.getElementById('total-segs').textContent = valid;

    if (valid > 1) {
      breakdownCard.classList.add('visible');
      document.getElementById('breakdown-list').innerHTML =
        breakdown.map(b =>
          `<div class="breakdown-item">
            <span class="breakdown-range">${b.from} – ${b.to}</span>
            <span class="breakdown-val">${b.diff.toFixed(2)} שע'</span>
          </div>`
        ).join('');
    } else {
      breakdownCard.classList.remove('visible');
    }
  } else {
    summaryCard.classList.remove('visible');
    breakdownCard.classList.remove('visible');
  }
}

function render() {
  const container = document.getElementById('segments');
  container.innerHTML = segments.map(s => `
    <div class="segment-row" data-id="${s.id}">
      <input class="time-input from" type="text" inputmode="numeric" placeholder="08:00" oninput="calculate()" />
      <div class="dash">–</div>
      <input class="time-input to" type="text" inputmode="numeric" placeholder="17:00" oninput="calculate()" />
      ${segments.length > 1
        ? `<button class="remove-btn" onclick="removeSegment(${s.id})" title="הסר">✕</button>`
        : `<div style="width:32px"></div>`
      }
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
